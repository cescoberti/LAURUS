<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32" role="img" aria-label="LAURUS">
  <!--
    Laurel sprig whose rising stroke is also a checkmark: one sign, two
    readings — victory, and "done, off the list". Single constant-weight
    stroke, rounded joins. Colour via currentColor: set `color` on an
    ancestor, or override --laurus-primary from brand/tokens.css.
  -->
  <g fill="none" stroke="var(--laurus-primary, currentColor)" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round">
    <path d="M7 17.5 L13 24 L25.5 8" />
  </g>
  <path
    d="M16 20 q-3.6 -0.4 -4.8 -3.6 q3.6 -0.6 4.8 3.6 Z
       M19 16.5 q-3.7 -0.2 -5 -3.5 q3.7 -0.7 5 3.5 Z
       M22 13 q-3.7 0 -5.1 -3.3 q3.7 -0.8 5.1 3.3 Z"
    fill="var(--laurus-primary, currentColor)"
  />
</svg>
